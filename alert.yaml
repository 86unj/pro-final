apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: argocd-basic-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: argocd-basic-alerts
    rules:
    - alert: ArgoCDAppNotHealthy
      expr: argocd_app_info{health_status!="Healthy"} == 1
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: Argo CD app {{ $labels.name }} is not Healthy
        description: Health status is {{ $labels.health_status }} for app {{ $labels.name }}

    - alert: ArgoCDAppOutOfSync
      expr: argocd_app_info{sync_status!="Synced"} == 1
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: Argo CD app {{ $labels.name }} is OutOfSync
        description: Sync status is {{ $labels.sync_status }} for app {{ $labels.name }}